<html layout:decorate="~{layout}">
<div layout:fragment="content" class="container my-3">
회원가입
    <form th:action="@{/member/register}" th:object="${registerForm}" method="POST">
        <ul th:if="${#fields.hasAnyErrors()}">
            <li th:each="err : ${#fields.allErrors()}" th:text="${err}" style="color:red;"></li>
        </ul>
        <table>
            <tr>
                <td><label for="username">아이디</label></td>
                <td><input type="text" th:field="*{username}"></td>
            </tr>
            <tr>
                <td><label for="nick">닉네임</label></td>
                <td><input type="text" th:field="*{nick}"></td>
            </tr>
            <tr>
                <td><label for="password">패스워드</label></td>
                <td><input type="password" th:field="*{password}"></td>
            </tr>
            <tr>
                <td><label for="passwordCheck">패스워드 확인</label></td>
                <td><input type="password" th:field="*{passwordCheck}"></td>
            </tr>
        </table>
        <input type="submit" />
    </form>
</div>
</html>
