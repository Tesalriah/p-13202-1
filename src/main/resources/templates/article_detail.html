<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<table>
    <tr>
        <td>제목</td>
        <td th:text="${article.title}"></td>
    </tr>
    <tr>
        <td>내용</td>
        <td th:text="${article.content}"></td>
    </tr>
    <tr>
        <td>작성일</td>
        <td th:text="${#temporals.format(article.createDate, 'yyyy-MM-dd HH:mm')}"></td>
    </tr>
</table>
<a th:href="@{/article/list}">목록</a>
<a th:href="@{'/article/modify/' + ${article.id}}">수정</a>
<form th:action="@{'/article/remove/' + ${id}}" method="post">
    <button type="submit">삭제</button>
</form>
</body>
</html>
